<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honor of Veylor</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* Global Reset */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Share Tech Mono', monospace;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 0 10px #fff);
        }

        /* Polygon Styles */
        .poly {
            position: absolute;
            color: HSL(var(--hue), 100%, 65%);
            filter: drop-shadow(0 0 15px currentcolor);
            mix-blend-mode: screen;
            /* Added 'alternate' to fix the fly-away issue */
            animation: pos 8s ease-in-out infinite alternate;
        }

        .poly:before {
            display: block;
            margin: -10em;
            padding: 10em;
            border-radius: 50%;
            transform: scale(0);
            background: currentcolor;
            clip-path: var(--p0);
            animation: inherit;
            animation-name: poly-pulse;
            animation-timing-function: ease-out;
            content: "";
        }

        /* Specific Polygon Positions and Shapes */
        .poly:nth-child(n + 1) { top: 50vh; left: 50vw; --x: 10vw; --y: -10vh; --hue: 26; --p0: polygon(calc(50%*(1 + -0.99985)) calc(50%*(1 + 0.01745)), calc(50%*(1 + -0.81915)) calc(50%*(1 + -0.57358)), calc(50%*(1 + -0.32557)) calc(50%*(1 + -0.94552)), calc(50%*(1 + 0.29237)) calc(50%*(1 + -0.9563)), calc(50%*(1 + 0.79864)) calc(50%*(1 + -0.60182)), calc(50%*(1 + 0.99985)) calc(50%*(1 + -0.01745)), calc(50%*(1 + 0.81915)) calc(50%*(1 + 0.57358)), calc(50%*(1 + 0.32557)) calc(50%*(1 + 0.94552)), calc(50%*(1 + -0.29237)) calc(50%*(1 + 0.9563)), calc(50%*(1 + -0.79864)) calc(50%*(1 + 0.60182)), calc(50%*(1 + -0.99985)) calc(50%*(1 + 0.01745))); --p1: polygon(calc(50%*(1 + -0.99985)) calc(50%*(1 + 0.01745)), calc(50%*(1 + -0.81915)) calc(50%*(1 + -0.57358)), calc(50%*(1 + -0.32557)) calc(50%*(1 + -0.94552)), calc(50%*(1 + 0.29237)) calc(50%*(1 + -0.9563)), calc(50%*(1 + 0.79864)) calc(50%*(1 + -0.60182)), calc(50%*(1 + 0.99985)) calc(50%*(1 + -0.01745)), calc(50%*(1 + 0.81915)) calc(50%*(1 + 0.57358)), calc(50%*(1 + 0.32557)) calc(50%*(1 + 0.94552)), calc(50%*(1 + -0.29237)) calc(50%*(1 + 0.9563)), calc(50%*(1 + -0.79864)) calc(50%*(1 + 0.60182)), calc(50%*(1 + -0.99985)) calc(50%*(1 + 0.01745))); }
        .poly:nth-child(n + 4) { top: 25vh; left: 75vw; --x: -20vw; --y: 20vh; --hue: 218; --p0: polygon(calc(50%*(1 + 0.80902)) calc(50%*(1 + 0.58779)), calc(50%*(1 + 0.04486)) calc(50%*(1 + 0.99899)), calc(50%*(1 + -0.75307)) calc(50%*(1 + 0.65794)), calc(50%*(1 + -0.98393)) calc(50%*(1 + -0.17856)), calc(50%*(1 + -0.47387)) calc(50%*(1 + -0.8806)), calc(50%*(1 + 0.39303)) calc(50%*(1 + -0.91953)), calc(50%*(1 + 0.96396)) calc(50%*(1 + -0.26604))); --p1: var(--p0); }
        .poly:nth-child(n + 7) { top: 75vh; left: 25vw; --x: 15vw; --y: -15vh; --hue: 28; --p0: polygon(calc(50%*(1 + -0.37461)) calc(50%*(1 + -0.92718)), calc(50%*(1 + 0.49134)) calc(50%*(1 + -0.87097)), calc(50%*(1 + 0.9873)) calc(50%*(1 + -0.1589)), calc(50%*(1 + 0.7398)) calc(50%*(1 + 0.67283)), calc(50%*(1 + -0.06478)) calc(50%*(1 + 0.9979)), calc(50%*(1 + -0.82058)) calc(50%*(1 + 0.57153)), calc(50%*(1 + -0.95846)) calc(50%*(1 + -0.28521))); --p1: var(--p0); }
        
        /* Text Styles */
        .text-container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
        }

        .glitch-text {
            font-size: clamp(2rem, 8vw, 5rem);
            color: #00ff99;
            text-shadow: 0 0 10px #00ff99, 0 0 20px #00ff99;
            text-transform: uppercase;
            letter-spacing: 5px;
            display: block;
            line-height: 1.2;
        }

        .glitch-text span {
            display: inline-block;
            min-width: 0.5ch;
            white-space: pre;
        }

        /* Animations */
        @keyframes pos {
            from { transform: translate(0, 0) rotate(0deg); }
            to { transform: translate(var(--x), var(--y)) rotate(90deg); }
        }

        @keyframes poly-pulse {
            0% { transform: scale(0); opacity: 0; }
            20% { opacity: 1; clip-path: var(--p1); }
            80% { opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; clip-path: var(--p1); }
        }
    </style>
</head>
<body>

    <div class="poly"></div><div class="poly"></div><div class="poly"></div>
    <div class="poly"></div><div class="poly"></div><div class="poly"></div>
    <div class="poly"></div><div class="poly"></div><div class="poly"></div>
    <div class="poly"></div><div class="poly"></div><div class="poly"></div>

    <div class="text-container">
        <h1 class="glitch-text" id="glitchText"></h1>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const textElement = document.getElementById('glitchText');
            // Using \n to control exactly where the second word wraps
            const originalText = "TO BE ANNOUNCED BY\nNNOIYEDWARE"; 
            const chars = '!@#$%^&*()_+{}:"<>?|[];\',./1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ';

            // Split and create spans
            originalText.split('').forEach(char => {
                if (char === '\n') {
                    textElement.appendChild(document.createElement('br'));
                } else {
                    const span = document.createElement('span');
                    span.innerHTML = char === ' ' ? '&nbsp;' : char;
                    textElement.appendChild(span);
                }
            });

            const spans = textElement.querySelectorAll('span');

            function startDecoderEffect() {
                const tl = gsap.timeline({
                    onComplete: () => gsap.delayedCall(3, startDecoderEffect)
                });

                spans.forEach((span, i) => {
                    const finalChar = span.innerHTML;
                    if (finalChar === '&nbsp;') return;

                    tl.to({}, {
                        duration: 1.2,
                        onUpdate: () => {
                            span.textContent = chars[Math.floor(Math.random() * chars.length)];
                        },
                        onComplete: () => {
                            span.innerHTML = finalChar;
                        }
                    }, i * 0.04);
                });
            }

            startDecoderEffect();
        });
    </script>
</body>
</html>
