<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>nNoiyedWare is me</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<!-- GSAP CDN (keep this before script.js) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>

<!-- ===== SVG BACKGROUND ===== -->
<svg id="bg" viewBox="-500 -500 1000 1000" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <!-- two neon blur sizes for multilayer glow -->
    <filter id="neon-lg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b1"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="neon-sm" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- root group that orbits (we will translate/rotate this with GSAP) -->
  <g id="orbitRoot" transform="translate(0,0)"></g>
</svg>

<!-- ===== TEXT (decoder) ===== -->
<div class="text-container">
  <h1 class="thank-you-text" id="thankYouText"></h1>
</div>

<!-- link external script (defer behavior is fine because GSAP loaded above) -->
<script src="script.js" defer></script>
</body>
</html>
