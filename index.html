<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>nNoiyedWare is me</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<!-- GSAP CDN (keep this before script.js) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<style>
/* ====== BASE ====== */
html,body {
  height:100%;
  margin:0;
  background:#000;
  overflow:hidden;
  font-family:'Share Tech Mono', monospace;
}

/* SVG covers the screen */
svg#bg {
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  display:block;
  mix-blend-mode:screen;
}

/* TEXT overlay */
.text-container {
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10;
  pointer-events:none;
  text-align:center;
  padding:20px;
  box-sizing:border-box;
}

.thank-you-text {
  color:#00ff99;
  text-transform:uppercase;
  font-size:clamp(2rem,8vw,6rem);
  line-height:1;
  letter-spacing:.12em;
  text-shadow:
    0 0 5px #00ff99,
    0 0 15px #00ff99,
    0 0 30px #00ff99;
  font-weight:400;
}

/* per-letter spans: reduce spacing and allow transforms */
.thank-you-text span {
  display:inline-block;
  will-change:transform,opacity;
}
</style>
</head>
<body>

<!-- ===== SVG BACKGROUND ===== -->
<svg id="bg" viewBox="-500 -500 1000 1000" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <!-- two neon blur sizes for multilayer glow -->
    <filter id="neon-lg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b1"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="neon-sm" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- root group that orbits (we will translate/rotate this with GSAP) -->
  <g id="orbitRoot" transform="translate(0,0)"></g>
</svg>

<!-- ===== TEXT (decoder) ===== -->
<div class="text-container">
  <h1 class="thank-you-text" id="thankYouText"></h1>
</div>

<!-- link external script (defer behavior is fine because GSAP loaded above) -->
<script src="script.js" defer></script>
</body>
</html>
